# Release pipeline: verify → semantic-release (version bump, tag, GitHub Release, npm publish).
#
# Version is derived from [Conventional Commits](https://www.conventionalcommits.org/) on the
# default branch, not from a manually edited package.json. semantic-release updates package.json
# and package-lock.json, creates git tag vX.Y.Z, publishes to npm with provenance, and opens
# a GitHub Release.
#
# Prereleases: push to branch `beta` or `alpha` to publish e.g. 1.0.0-beta.1 on npm dist-tag
# `beta` / `alpha` (see .releaserc.json "branches").
#
# CRITICAL for 0.x packages: semantic-release uses git tags as the source of truth. If there are
# NO vX.Y.Z tags on the branch, the *first* automated release is hardcoded to 1.0.0 (it does NOT
# read package.json for that first version). Tag every version already on npm BEFORE the first
# successful release job (e.g. git tag v0.1.0 <sha> && git tag v0.1.2 <sha> && git push origin --tags).
#
# Secrets (Settings → Secrets → Actions):
#   NPM_TOKEN — npm automation token with publish rights for @bdzscaler
#
# Permissions: default GITHUB_TOKEN is used for releases and tags (contents: write).

name: Release

on:
  push:
    branches: [main, master, beta, alpha]
  pull_request:
    branches: [main, master]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only the production dependency graph (this package ships `dependencies: {}`).
      # Full `npm audit` fails on nested packages inside the `npm` tarball pulled by
      # @semantic-release/npm — not exploitable from the published community node.
      - name: npm audit (production graph only)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Prettier (check)
        run: npx prettier --check nodes credentials

      - name: ESLint (TypeScript / n8n-nodes-base)
        run: npm run lint

      - name: ESLint (n8n Cloud / dist — matches Creator Portal scanner)
        run: npm run lint:dist

      - name: Unit tests (Jest)
        run: npm test -- --passWithNoTests

  release:
    name: semantic-release (tag, GitHub Release, npm)
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git for semantic-release commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # semantic-release/lib/get-next-version.js: if lastRelease.version is missing (no v* tags),
      # next version is ALWAYS constants.FIRST_RELEASE ("1.0.0") — not package.json.
      - name: Guard — 0.x repos must have semver git tags before semantic-release
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          node -e "process.exit(/^0\\./.test(process.argv[1]) ? 0 : 1)" "$PKG_VER" || { echo "package.json is not 0.x ($PKG_VER); skipping tag guard."; exit 0; }
          if git tag -l | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Semver git tag(s) present; ok to run semantic-release on 0.x."
            exit 0
          fi
          echo "::error::No vX.Y.Z git tags, but package.json is 0.x ($PKG_VER). semantic-release would publish 1.0.0. Tag published npm versions first, then push. See README → Releasing."
          exit 1

      # setup-node + registry-url writes .npmrc using NODE_AUTH_TOKEN (not NPM_TOKEN).
      # @semantic-release/npm falls back to that file after OIDC exchange (404 until trusted
      # publishing is configured on npm for this repo).
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
