# Release pipeline: verify → semantic-release (version bump, tag, GitHub Release, npm publish).
#
# Version is derived from [Conventional Commits](https://www.conventionalcommits.org/) on the
# default branch, not from a manually edited package.json. semantic-release updates package.json
# and package-lock.json, creates git tag vX.Y.Z, publishes to npm with provenance, and opens
# a GitHub Release.
#
# Prereleases: push to branch `beta` or `alpha` to publish e.g. 1.0.0-beta.1 on npm dist-tag
# `beta` / `alpha` (see .releaserc.json "branches").
#
# Before first semantic-release run, ensure git tags exist for versions already published to npm
# (e.g. git tag v0.1.2 <commit> && git push origin v0.1.2) so the next bump continues from 0.x.
#
# Secrets (Settings → Secrets → Actions):
#   NPM_TOKEN — npm automation token with publish rights for @bdzscaler
#
# Permissions: default GITHUB_TOKEN is used for releases and tags (contents: write).

name: Release

on:
  push:
    branches: [main, master, beta, alpha]
  pull_request:
    branches: [main, master]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Prettier (check)
        run: npx prettier --check nodes credentials

      - name: ESLint (TypeScript / n8n-nodes-base)
        run: npm run lint

      - name: ESLint (n8n Cloud / dist — matches Creator Portal scanner)
        run: npm run lint:dist

      - name: Unit tests (Jest)
        run: npm test -- --passWithNoTests

  release:
    name: semantic-release (tag, GitHub Release, npm)
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git for semantic-release commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
