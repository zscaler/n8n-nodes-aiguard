# Publish @bdzscaler/n8n-nodes-aiguard to npm when a PR is merged into the default branch.
#
# Triggers: pull_request closed + merged only (not direct pushes, not closed-without-merge).
# Gates: npm audit → build → prettier → eslint → jest must pass before publish.
#
# Setup (repository Settings → Secrets → Actions):
#   NPM_TOKEN — npm automation token with publish rights for the @bdzscaler scope
#
# Bump the version in package.json on the release PR; if that version already exists on npm,
# the publish step is skipped (idempotent).
#
# Manual / API: push the version bump to main, then either merge a PR (as before) or run
# Actions → "Release to npm" → Run workflow (workflow_dispatch), or call the GitHub API below.
#
# Node >= 22 required for npm ci (isolated-vm via eslint-plugin-n8n-nodes-base).

name: Release to npm

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-npm-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify (audit, build, lint, test)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Prettier (check)
        run: npx prettier --check nodes credentials

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test -- --passWithNoTests

  publish:
    name: Publish to npm
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if version is already on npm
        id: version
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VER} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VER} not found on npm; will publish."
          fi

      - name: Publish to npm
        if: steps.version.outputs.exists != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
